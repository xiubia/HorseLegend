<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="x5-orientation" content="landscape" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>HorseLegend</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game-root {
      width: 100%; height: 100%;
      position: relative;
      outline: none;
    }
    canvas { display: block; }
    #loading-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: #0a0a1a; color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 9000;
      transition: opacity 0.4s ease-out;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #5af; border-radius: 50%;
      animation: rotate 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    
    /* 横屏提示（仅移动端竖屏时显示） */
    @media screen and (max-width: 768px) and (orientation: portrait) {
      #orientation-hint {
        display: flex !important;
      }
    }
    #orientation-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      color: #fff;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #orientation-hint svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      animation: rotate-phone 1.5s ease-in-out infinite;
    }
    @keyframes rotate-phone {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
  </style>
  <script type="module" crossorigin src="/HorseLegend/assets/index-BoJz-1vR.js"></script>
  <link rel="modulepreload" crossorigin href="/HorseLegend/assets/three-Cws2d3zV.js">
</head>
<body>
  <div id="game-root" tabindex="0">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div>Loading…</div>
    </div>
  </div>
  
  <!-- 横屏提示 -->
  <div id="orientation-hint">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3">
      <rect x="20" y="30" width="60" height="40" rx="5" />
      <circle cx="50" cy="50" r="3" fill="currentColor" />
    </svg>
    <div style="font-size: 18px; font-weight: bold;">请旋转设备至横屏</div>
    <div style="font-size: 14px; color: #999; margin-top: 8px;">以获得最佳游戏体验</div>
  </div>
  
</body>
</html>
