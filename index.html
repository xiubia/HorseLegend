<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D Game</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game-root {
      width: 100%; height: 100%;
      position: relative;
      outline: none;
    }
    canvas { display: block; }
    #loading-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: #0a0a1a; color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 9000;
      transition: opacity 0.4s ease-out;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #5af; border-radius: 50%;
      animation: rotate 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
  </style>
  <script type="module" crossorigin src="/HorseLegend/assets/index-BWesvsk6.js"></script>
  <link rel="modulepreload" crossorigin href="/HorseLegend/assets/three-Cws2d3zV.js">
</head>
<body>
  <div id="game-root" tabindex="0">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div>Loading…</div>
    </div>
  </div>
</body>
</html>
